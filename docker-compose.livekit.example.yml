# Example stack for local development. Copy to docker-compose.livekit.yml and adjust secrets.
# Official reference: https://docs.livekit.io/transport/self-hosting/deployment/
#
# Usage:
#   docker compose -f docker-compose.livekit.example.yml up
#
# Then set llmpath-server .env:
#   LIVEKIT_HTTP_URL=http://127.0.0.1:7880
#   LIVEKIT_API_KEY=devkey
#   LIVEKIT_API_SECRET=<match keys in livekit.yaml below>
#   LIVEKIT_RECORDINGS_DIR=<absolute path to ./livekit-recordings on host>
#   LIVEKIT_EGRESS_FILE_PREFIX=/out
#
# Room composite needs Chrome: cap_add SYS_ADMIN on egress is required (LiveKit egress v1.7.6+).
#
# Web .env.local:
#   NEXT_PUBLIC_LIVEKIT_URL=ws://127.0.0.1:7880

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  livekit:
    # Pin versions — update intentionally, never use :latest in production
    image: livekit/livekit-server:v1.8.3
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    ports:
      - '7880:7880'
      - '7881:7881'
      - '7882:7882/udp'
    volumes:
      - ./livekit.example.yaml:/etc/livekit.yaml
    depends_on:
      - redis

  egress:
    # Pin versions — update intentionally, never use :latest in production
    image: livekit/egress:v1.8.4
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    depends_on:
      - livekit
      - redis
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    volumes:
      - ./egress.example.yaml:/etc/egress.yaml
      - ./livekit-recordings:/out
